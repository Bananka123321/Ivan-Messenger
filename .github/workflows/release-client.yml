name: Release Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_version: '6.4.2'
            qt_arch: 'win64_msvc2019_64'
            artifact_name: ChatClient_Windows

          - os: ubuntu-22.04
            qt_version: '6.4.2'
            qt_arch: 'linux_gcc_64'
            artifact_name: ChatClient_Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      ######################################################################
      # WINDOWS
      ######################################################################

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "release/ChatClient_Windows"

          New-Item -ItemType Directory -Force -Path $dir | Out-Null

          Copy-Item "build/ClientPart/Release/Client.exe" "$dir/" -Force
          Copy-Item "config.json" "$dir/" -Force

          windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            "$dir/Client.exe"

          @"
Windows:
1. Raspack
2. Zapustite Client.exe
"@ | Out-File "$dir/README.txt"

          Compress-Archive `
            -Path "$dir/*" `
            -DestinationPath "release/ChatClient_Windows.zip"

      ######################################################################
      # LINUX
      ######################################################################

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e

          dir="release/ChatClient_Linux"

          mkdir -p "$dir"

          cp build/ClientPart/Client "$dir/"
          cp config.json "$dir/"

          chmod +x "$dir/Client"

          linuxdeployqt "$dir/Client" \
            -appimage \
            -unsupported-allow-new-glibc || true

          cat > "$dir/run.sh" << 'EOF'
#!/bin/bash

DIR=$(cd "$(dirname "$0")" && pwd)

export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"

exec "$DIR/Client"
EOF

          chmod +x "$dir/run.sh"

          echo "Run: ./run.sh" > "$dir/README.txt"

          tar -czf release/ChatClient_Linux.tar.gz -C release ChatClient_Linux

      ######################################################################
      # ARTIFACTS
      ######################################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.zip
            release/*.tar.gz

  ##########################################################################
  # RELEASE
  ##########################################################################

  release:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display files
        run: find artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz

          tag_name: ${{ github.ref_name }}

          body: |
            Automatic client build

            Windows:
            - unpack archive
            - run Client.exe

            Linux:
            - unpack archive
            - chmod +x run.sh
            - ./run.sh

            Server:
            31.192.108.37:6767
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}